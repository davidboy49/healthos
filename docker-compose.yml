services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: healthos
      POSTGRES_PASSWORD: healthos
      POSTGRES_DB: healthos
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthos -d healthos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: ./apps/api
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    command: uvicorn healthos_api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./apps/api
    env_file: .env
    depends_on:
      - api
      - redis
    command: celery -A healthos_api.worker.celery_app worker --loglevel=INFO

  scheduler:
    build:
      context: ./apps/api
    env_file: .env
    depends_on:
      - api
      - redis
    command: celery -A healthos_api.worker.celery_app beat --loglevel=INFO

  web:
    build:
      context: ./apps/web
    env_file: .env
    depends_on:
      - api
    ports:
      - "3000:3000"

  reverse-proxy:
    image: caddy:2-alpine
    profiles: ["production"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - api

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:

